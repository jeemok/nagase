<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Rough ink texture filter -->
    <filter id="inkStamp" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Faded/worn look -->
    <filter id="worn">
      <feTurbulence type="fractalNoise" baseFrequency="0.065" numOctaves="3" seed="8" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="greyNoise"/>
      <feComponentTransfer in="greyNoise" result="mask">
        <feFuncA type="linear" slope="0.6" intercept="0.55"/>
      </feComponentTransfer>
      <feComposite in="SourceGraphic" in2="mask" operator="in"/>
    </filter>
  </defs>

  <!-- Main stamp group with slight rotation for realism -->
  <g transform="translate(100,100) rotate(-8) translate(-100,-100)" filter="url(#worn)">

    <!-- Outer circle -->
    <circle cx="100" cy="100" r="88" fill="none" stroke="#1a3d7c" stroke-width="3.5"/>
    <!-- Inner circle -->
    <circle cx="100" cy="100" r="80" fill="none" stroke="#1a3d7c" stroke-width="1.5"/>

    <!-- Top arc text: IMMIGRATION -->
    <path id="topText" d="M 25,100 a 75,75 0 0,1 150,0" fill="none"/>
    <text font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#1a3d7c" font-weight="900" letter-spacing="4">
      <textPath href="#topText" startOffset="50%" text-anchor="middle">IMMIGRATION</textPath>
    </text>

    <!-- Bottom arc text: THAILAND -->
    <path id="bottomText" d="M 22,108 a 78,78 0 0,0 156,0" fill="none"/>
    <text font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#1a3d7c" font-weight="900" letter-spacing="5">
      <textPath href="#bottomText" startOffset="50%" text-anchor="middle">THAILAND</textPath>
    </text>

    <!-- Divider lines -->
    <line x1="35" y1="88" x2="72" y2="88" stroke="#1a3d7c" stroke-width="1.5"/>
    <line x1="128" y1="88" x2="165" y2="88" stroke="#1a3d7c" stroke-width="1.5"/>
    <line x1="35" y1="116" x2="72" y2="116" stroke="#1a3d7c" stroke-width="1.5"/>
    <line x1="128" y1="116" x2="165" y2="116" stroke="#1a3d7c" stroke-width="1.5"/>

    <!-- Center content -->
    <!-- Small plane icon -->
    <g transform="translate(100, 80)">
      <polygon points="0,-6 -3,-2 -12,2 -3,2 -4,6 0,4 4,6 3,2 12,2 3,-2" fill="#1a3d7c"/>
    </g>

    <!-- Date -->
    <text x="100" y="102" font-family="'Courier New', monospace" font-size="14" fill="#1a3d7c" text-anchor="middle" font-weight="bold" letter-spacing="1">APR 2026</text>

    <!-- Entry indicator -->
    <text x="100" y="117" font-family="'Arial', sans-serif" font-size="8" fill="#1a3d7c" text-anchor="middle" font-weight="bold" letter-spacing="3">ARRIVED</text>

    <!-- Small decorative stars between arcs and lines -->
    <text x="80" y="92" font-size="6" fill="#1a3d7c">★</text>
    <text x="116" y="92" font-size="6" fill="#1a3d7c">★</text>

  </g>
</svg>
