<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="paperBg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#f5e6c8"/>
      <stop offset="100%" stop-color="#d4b896"/>
    </radialGradient>
    <linearGradient id="inkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b2252"/>
      <stop offset="100%" stop-color="#6b1a3f"/>
    </linearGradient>
  </defs>

  <!-- Outer stamp border (perforated/dashed look) -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#c9a84c" stroke-width="2" stroke-dasharray="4 3" opacity="0.6"/>

  <!-- Inner circle background -->
  <circle cx="100" cy="100" r="82" fill="url(#paperBg)" opacity="0.95"/>

  <!-- Decorative double ring -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="url(#inkGrad)" stroke-width="2.5" opacity="0.8"/>
  <circle cx="100" cy="100" r="72" fill="none" stroke="url(#inkGrad)" stroke-width="1" opacity="0.5"/>

  <!-- Bottom text arc: THAILAND -->
  <path id="bottomArc" d="M 28,108 a 72,72 0 0,0 144,0" fill="none"/>
  <text font-family="Georgia, serif" font-size="14" fill="#6b1a3f" font-weight="bold" letter-spacing="4" opacity="0.85">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">THAILAND</textPath>
  </text>

  <!-- Thai Temple (Wat) Silhouette - larger and centered -->
  <g transform="translate(100, 82) scale(1.5)" fill="#6b1a3f" opacity="0.85">
    <!-- Main spire (Prang) -->
    <polygon points="0,-38 -4,-28 -6,-18 -3,-18 -5,-8 -8,0 8,0 5,-8 3,-18 6,-18 4,-28"/>
    <!-- Spire tip -->
    <polygon points="0,-42 -1.5,-38 1.5,-38"/>
    <!-- Left smaller spire -->
    <polygon points="-18,-20 -21,-12 -23,-4 -15,-4 -17,-12"/>
    <!-- Right smaller spire -->
    <polygon points="18,-20 21,-12 23,-4 15,-4 17,-12"/>
    <!-- Base/roof tiers -->
    <rect x="-28" y="0" width="56" height="5" rx="1"/>
    <rect x="-24" y="-4" width="48" height="4" rx="1"/>
    <!-- Base platform -->
    <rect x="-32" y="5" width="64" height="4" rx="1"/>
    <rect x="-35" y="9" width="70" height="3" rx="1"/>
  </g>

  <!-- Small decorative stars -->
  <text x="42" y="90" font-size="7" fill="#6b1a3f" opacity="0.6">✦</text>
  <text x="152" y="90" font-size="7" fill="#6b1a3f" opacity="0.6">✦</text>

  <!-- Subtle aging marks -->
  <circle cx="60" cy="130" r="15" fill="#6b1a3f" opacity="0.03"/>
  <circle cx="140" cy="70" r="12" fill="#6b1a3f" opacity="0.04"/>
</svg>
