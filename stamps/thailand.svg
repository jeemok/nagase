<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="flagClip">
      <circle cx="100" cy="100" r="68"/>
    </clipPath>
  </defs>

  <!-- Outer dashed circle border -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#c9a84c" stroke-width="2.5" stroke-dasharray="6 4" opacity="0.7"/>

  <!-- Inner dashed circle border -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>

  <!-- Thai flag clipped to circle -->
  <g clip-path="url(#flagClip)">
    <!-- Red stripe (top) -->
    <rect x="30" y="32" width="140" height="27.2" fill="#A51931"/>
    <!-- White stripe -->
    <rect x="30" y="59.2" width="140" height="27.2" fill="#F4F5F8"/>
    <!-- Blue stripe (center, double height) -->
    <rect x="30" y="86.4" width="140" height="27.2" fill="#2D2A4A"/>
    <!-- White stripe -->
    <rect x="30" y="113.6" width="140" height="27.2" fill="#F4F5F8"/>
    <!-- Red stripe (bottom) -->
    <rect x="30" y="140.8" width="140" height="27.2" fill="#A51931"/>
  </g>

  <!-- Circle outline on top of flag for clean edge -->
  <circle cx="100" cy="100" r="68" fill="none" stroke="#c9a84c" stroke-width="2" opacity="0.6"/>
</svg>
