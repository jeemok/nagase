<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 200" width="220" height="200">
  <defs>
    <filter id="missedWorn" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.055" numOctaves="4" seed="7" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="grey"/>
      <feComponentTransfer in="grey" result="mask">
        <feFuncA type="linear" slope="0.65" intercept="0.42"/>
      </feComponentTransfer>
      <feComposite in="SourceGraphic" in2="mask" operator="in"/>
    </filter>
  </defs>

  <g transform="translate(110,100) rotate(4) translate(-110,-100)" filter="url(#missedWorn)">

    <!-- Outer circle -->
    <circle cx="110" cy="100" r="98" fill="none" stroke="#c0392b" stroke-width="5"/>
    <!-- Inner circle -->
    <circle cx="110" cy="100" r="86" fill="none" stroke="#c0392b" stroke-width="2.5"/>

    <!-- Airplane icon at top -->
    <g transform="translate(110, 28) scale(1.1)" fill="#c0392b">
      <!-- Fuselage -->
      <ellipse cx="0" cy="0" rx="3" ry="11" transform="rotate(-90)"/>
      <!-- Wings -->
      <polygon points="-1,-3 -14,3 -14,6 -1,3"/>
      <polygon points="1,-3 14,3 14,6 1,3"/>
      <!-- Tail fins -->
      <polygon points="-1,8 -6,12 -6,14 -1,10"/>
      <polygon points="1,8 6,12 6,14 1,10"/>
      <!-- Nose -->
      <ellipse cx="12" cy="0" rx="3" ry="2"/>
    </g>

    <!-- FLIGHT text -->
    <text
      x="110" y="82"
      font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
      font-size="34" font-weight="900"
      fill="#c0392b"
      text-anchor="middle"
      letter-spacing="2">FLIGHT</text>

    <!-- MISSED text -->
    <text
      x="110" y="118"
      font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
      font-size="34" font-weight="900"
      fill="#c0392b"
      text-anchor="middle"
      letter-spacing="2">MISSED</text>

    <!-- Left star -->
    <g transform="translate(30, 98)" fill="#c0392b">
      <polygon points="0,-7 1.6,-2.2 6.6,-2.2 2.7,0.9 4.3,5.7 0,3 -4.3,5.7 -2.7,0.9 -6.6,-2.2 -1.6,-2.2"/>
    </g>

    <!-- Right star -->
    <g transform="translate(190, 98)" fill="#c0392b">
      <polygon points="0,-7 1.6,-2.2 6.6,-2.2 2.7,0.9 4.3,5.7 0,3 -4.3,5.7 -2.7,0.9 -6.6,-2.2 -1.6,-2.2"/>
    </g>

    <!-- — NOT STAMPED — text -->
    <text
      x="110" y="148"
      font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
      font-size="13" font-weight="700"
      fill="#c0392b"
      text-anchor="middle"
      letter-spacing="1.5">&#x2014; NOT STAMPED &#x2014;</text>

  </g>
</svg>
