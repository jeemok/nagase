<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <!-- Simplified world map continents as subtle watermark -->
  <g fill="#c8d8e4" opacity="0.25">
    <!-- North America -->
    <path d="M150,180 L170,160 L200,155 L230,140 L260,135 L290,130 L310,140 L330,135 L350,150 L340,170 L330,190 L310,200 L290,210 L280,230 L270,250 L260,270 L240,290 L230,310 L220,320 L210,310 L200,290 L190,270 L180,260 L170,240 L160,220 L150,200Z"/>
    <!-- Greenland -->
    <path d="M310,90 L330,80 L360,85 L380,95 L370,110 L350,120 L330,115 L310,105Z"/>
    <!-- South America -->
    <path d="M250,340 L270,330 L290,340 L300,360 L310,390 L305,420 L300,450 L290,480 L280,510 L270,530 L260,540 L250,530 L245,500 L240,470 L235,440 L238,410 L240,380 L245,360Z"/>
    <!-- Europe -->
    <path d="M530,140 L550,130 L570,135 L590,130 L610,140 L620,155 L610,170 L600,180 L580,185 L560,180 L540,175 L530,160Z"/>
    <!-- UK -->
    <path d="M500,140 L510,130 L520,135 L515,150 L505,155Z"/>
    <!-- Africa -->
    <path d="M550,220 L570,210 L590,215 L610,220 L620,240 L625,270 L620,300 L615,330 L605,360 L595,390 L580,410 L565,400 L555,380 L548,350 L545,320 L540,290 L538,260 L542,240Z"/>
    <!-- Asia -->
    <path d="M630,120 L660,110 L700,105 L740,100 L780,105 L820,110 L860,120 L890,130 L910,145 L920,165 L910,185 L890,200 L860,210 L830,215 L800,220 L770,225 L740,230 L720,225 L700,220 L680,210 L660,195 L645,180 L635,160 L630,140Z"/>
    <!-- India -->
    <path d="M730,240 L750,235 L760,250 L755,275 L745,300 L735,310 L725,300 L720,275 L722,255Z"/>
    <!-- Southeast Asia -->
    <path d="M810,230 L830,225 L845,235 L850,250 L840,265 L825,270 L815,260 L810,245Z"/>
    <!-- Australia -->
    <path d="M850,380 L880,370 L920,365 L960,370 L980,385 L985,405 L975,425 L955,440 L930,445 L900,440 L875,430 L860,415 L855,400Z"/>
    <!-- New Zealand -->
    <path d="M1010,430 L1020,420 L1025,435 L1020,450 L1010,445Z"/>
    <!-- Japan -->
    <path d="M910,150 L920,140 L925,155 L920,170 L910,165Z"/>
    <!-- Indonesia archipelago -->
    <path d="M830,290 L845,285 L855,290 L850,298Z"/>
    <path d="M860,295 L875,290 L885,295 L880,303Z"/>
    <path d="M890,292 L905,288 L910,296 L900,300Z"/>
    <!-- Middle East -->
    <path d="M620,190 L640,185 L655,195 L650,210 L635,215 L620,210Z"/>
    <!-- Madagascar -->
    <path d="M630,380 L638,370 L642,385 L638,400 L630,395Z"/>
  </g>

  <!-- Subtle latitude/longitude grid lines -->
  <g stroke="#c8d8e4" stroke-width="0.3" opacity="0.15" fill="none">
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="800"/>
    <line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="900" y1="0" x2="900" y2="800"/>
    <!-- Curved tropics -->
    <path d="M 0,300 Q 300,280 600,300 Q 900,320 1200,300"/>
    <path d="M 0,500 Q 300,480 600,500 Q 900,520 1200,500"/>
  </g>

  <!-- Compass rose hint -->
  <g transform="translate(1050,650)" opacity="0.08" fill="#8a7a6a">
    <polygon points="0,-30 4,-8 0,-12 -4,-8"/>
    <polygon points="0,30 4,8 0,12 -4,8"/>
    <polygon points="-30,0 -8,-4 -12,0 -8,4"/>
    <polygon points="30,0 8,-4 12,0 8,4"/>
    <circle cx="0" cy="0" r="5" fill="none" stroke="#8a7a6a" stroke-width="1"/>
    <circle cx="0" cy="0" r="15" fill="none" stroke="#8a7a6a" stroke-width="0.5"/>
  </g>
</svg>
